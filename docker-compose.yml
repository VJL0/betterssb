services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: betterssb
      POSTGRES_PASSWORD: betterssb_dev
      POSTGRES_DB: betterssb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterssb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
